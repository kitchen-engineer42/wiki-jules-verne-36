<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vernean Voyages Wiki</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23a02128'/><text x='16' y='24' text-anchor='middle' font-family='serif' font-size='22' fill='%23f5f0e8' font-weight='bold'>V</text></svg>">

<!-- CDN 基地址：本地 js/css 404 时自动降级至此（本地开发由 serve.js fallback 接管，CDN 仅用于静态部署） -->
<meta name="cdn-base" content="https://baojie.github.io/memex/dist">

<!-- Import map：本地用 /plugins/（serve.js fallback），生产用 CDN
     document.write 确保 importmap 在所有 type="module" 脚本之前注入 -->
<script>
(function () {
  var h = location.hostname;
  var local = h === 'localhost' || h === '127.0.0.1' || h === '::1'
    || /^192\.168\./.test(h) || /^10\./.test(h)
    || /^172\.(1[6-9]|2\d|3[01])\./.test(h);
  var plugins = local ? '/plugins/' : 'https://baojie.github.io/memex/dist/plugins/';
  var map = '{"imports":{"@wiki/local/":"./local/","@wiki/plugins/":"' + plugins + '"}}';
  document.write('<script type="importmap">' + map + '<' + '/script>');
}());
</script>

<!-- 外部依赖（始终从 CDN 加载） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

<!-- 引擎样式：本地开发由 serve.js 从 $MEMEX_ROOT/wiki/public/ 回退提供；静态部署时降级至 CDN -->
<link id="main-css" rel="stylesheet" href="css/main.css"
      onerror="var me=this;me.onerror=null;var cdn=document.querySelector('meta[name=cdn-base]').content;fetch(cdn+'/dist-version.json').then(function(r){return r.json();}).then(function(v){me.href=cdn+'/css/'+v.css;}).catch(function(){me.href=cdn+'/css/memex.min.css';});">

<!-- local/local.css — 本地覆盖，动态追加以确保排在引擎样式之后 -->
<script>
(function() {
  var el = document.createElement('link');
  el.rel = 'stylesheet';
  el.href = './local/local.css';
  document.head.appendChild(el);
}());
</script>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="#" class="brand">Vernean Voyages Wiki</a>
    <form class="topnav-search" id="topnav-form">
      <input id="topnav-q" name="q" type="search"
             placeholder="Search pages…" data-i18n-placeholder="search_placeholder"
             autocomplete="off" list="topnav-pages">
      <datalist id="topnav-pages"></datalist>
    </form>
    <span id="crumb" class="crumb"></span>
    <span class="spacer"></span>
    <a href="#Special%3AAllPages" class="topnav-link" data-i18n="all_pages">All Pages</a>
    <a href="#Special%3AAll"      class="topnav-link" data-i18n="special_pages">Special Pages</a>
    <a href="#Special%3ARandom"   class="topnav-link" data-i18n="random">Random</a>
    <a href="#Special%3ARecent"   class="topnav-link" data-i18n="recent">Recent Changes</a>
    <div class="settings-wrap">
      <button id="settings-toggle" class="topnav-link topnav-btn" data-i18n="settings">Settings</button>
      <div id="settings-panel" class="settings-panel" hidden>
        <label class="setting-item">
          <input type="checkbox" id="setting-autolink">
          <span data-i18n="auto_wikilink">Auto-link</span>
        </label>
        <!-- i18n 插件会在此自动注入语言选择器 -->
      </div>
    </div>
    <a href="#About" class="topnav-link" data-i18n="about">About</a>
    <span id="status" class="status"></span>
  </div>
</nav>

<main class="page" id="page-root">
  <aside class="toc-sidebar" id="toc-sidebar" hidden></aside>
  <aside class="sidebar" id="sidebar" hidden>
    <div class="infobox" id="infobox" hidden></div>
    <figure class="sidebar-portrait" id="sidebar-portrait" hidden></figure>
  </aside>
  <article id="article">
    <p class="loading" data-i18n="loading">Loading…</p>
  </article>
</main>

<!-- ⚠️ 只保留这一个 <footer>。引擎插件（page-footer 等）会在运行时注入分类标签。 -->
<footer>
  <small>
    <span id="src-info"></span>
    <span id="broken-info"></span>
    <span class="footer-license">
      Vernean Voyages Wiki · Texts from the public-domain works of Jules Verne · Built with memex.
    </span>
  </small>
</footer>

<!-- 引擎 JS：本地开发由 serve.js 从 $MEMEX_ROOT/wiki/public/ 回退提供；静态部署时降级至 CDN -->
<script type="module" id="main-js" src="js/core.js"
        onerror="
          var cdn = document.querySelector('meta[name=cdn-base]').content;
          fetch(cdn + '/dist-version.json')
            .then(function(r){ return r.json(); })
            .then(function(v){
              var s = document.createElement('script');
              s.type = 'module';
              s.src = cdn + '/js/' + (v.js || 'memex.min.js');
              document.head.appendChild(s);
            })
            .catch(function(){
              var s = document.createElement('script');
              s.type = 'module';
              s.src = cdn + '/js/memex.min.js';
              document.head.appendChild(s);
            });
        "></script>

<!-- Settings panel toggle -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.getElementById('settings-toggle');
  var panel  = document.getElementById('settings-panel');
  if (!toggle || !panel) return;
  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    panel.hidden = !panel.hidden;
  });
  document.addEventListener('click', function(e) {
    if (!panel.hidden && !panel.contains(e.target) && e.target !== toggle) {
      panel.hidden = true;
    }
  });
});
</script>

<!-- 搜索框自动补全 -->
<script>
fetch('pages.lite.json').then(function(r){ return r.json(); }).then(function(data){
  var dl = document.getElementById('topnav-pages');
  var pages = data.pages ? Object.values(data.pages) : [];
  var labelToId = {};
  pages.forEach(function(p){
    var label = p.label || p.id || '';
    var o = document.createElement('option'); o.value = label; dl.appendChild(o);
    labelToId[label] = p.id || label;
    labelToId[p.id || label] = p.id || label;
    (p.aliases||[]).forEach(function(a){
      if(typeof a==='string'){
        var ao=document.createElement('option'); ao.value=a; dl.appendChild(ao);
        labelToId[a]=p.id||label;
      }
    });
  });
  document.getElementById('topnav-form').addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('topnav-q').value.trim();
    if(!v)return;
    var pid=labelToId[v];
    location.hash=pid?encodeURIComponent(pid):encodeURIComponent('Special:AllPages')+'?s='+encodeURIComponent(v);
  });
}).catch(function(){
  document.getElementById('topnav-form').addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('topnav-q').value.trim();
    if(v) location.hash=encodeURIComponent(v);
  });
});
</script>

</body>
</html>
